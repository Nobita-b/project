<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fashion Analyzer</title>
<link rel="stylesheet" href="{{ url_for('static', filename='recognise.css') }}">    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">
                <i class="fas fa-magic"></i>
                AI Fashion Analyzer
            </h1>
            <p class="subtitle">Discover your perfect style with AI-powered analysis</p>
        </header>

        <main class="main-content">
            <!-- Image Upload Section -->
            <section class="upload-section">
                <div class="upload-card">
                    <div class="upload-area" id="uploadArea">
                        <i class="fas fa-cloud-upload-alt upload-icon"></i>
                        <p>Upload a photo or use webcam</p>
                        <input type="file" id="imageUpload" accept="image/*" hidden>
                    </div>
                    <button class="btn-secondary" id="uploadBtn">
                        <i class="fas fa-upload"></i> Upload Photo
                    </button>
                </div>
            </section>

            <!-- Webcam Section -->
            <section class="webcam-section">
                <div class="webcam-card">
                    <video id="video" autoplay playsinline hidden></video>
                    <div id="webcamPreview" class="preview-container hidden">
                        <canvas id="canvas" hidden></canvas>
                        <img id="capturedImage" class="captured-img" hidden>
                        <div class="preview-overlay">
                            <button class="btn-danger capture-btn" id="retakeBtn" hidden>
                                <i class="fas fa-redo"></i> Retake
                            </button>
                        </div>
                    </div>
                    <div class="webcam-controls">
                        <button class="btn-primary" id="webcamBtn">
                            <i class="fas fa-video"></i> Use Webcam
                        </button>
                        <button class="btn-success capture-btn" id="captureBtn" hidden>
                            <i class="fas fa-camera"></i> Capture
                        </button>
                    </div>
                </div>
            </section>

            <!-- Analyze Button -->
            <section class="analyze-section">
                <button class="btn-analyze" id="analyzeBtn" disabled>
                    <i class="fas fa-brain"></i>
                    Analyze My Style
                </button>
            </section>

            <!-- Results Section -->
            <section class="results-section hidden" id="resultsSection">
                <div class="results-container">
                    <div class="result-image-container">
                        <img id="resultImage" class="result-image" alt="Analyzed image">
                    </div>
                    <div class="results-grid">
                        <div class="result-card">
                            <h3><i class="fas fa-user"></i> Gender</h3>
                            <div class="result-value" id="genderResult">Analyzing...</div>
                        </div>
                        <div class="result-card">
                            <h3><i class="fas fa-face-smile"></i> Face Shape</h3>
                            <div class="result-value" id="faceShapeResult">Analyzing...</div>
                        </div>
                        <div class="result-card">
                            <h3><i class="fas fa-palette"></i> Skin Tone</h3>
                            <div class="result-value" id="skinToneResult">Analyzing...</div>
                        </div>
                        <div class="result-card">
                            <h3><i class="fas fa-ruler"></i> Body Type</h3>
                            <div class="result-value" id="bodyTypeResult">Analyzing...</div>
                        </div>
                        <div class="result-card full-width">
                            <h3><i class="fas fa-tshirt"></i> Recommended Clothes</h3>
                            <div class="recommendations" id="clothesRecommendations"></div>
                        </div>
                        <div class="result-card full-width">
                            <h3><i class="fas fa-gem"></i> Recommended Accessories</h3>
                            <div class="recommendations" id="accessoriesRecommendations"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

<script src="{{ url_for('static', filename='recognise.js') }}"></script>
</body>
</html>
